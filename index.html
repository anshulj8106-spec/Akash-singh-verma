<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akash King Verma</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    /* NAVBAR */
    .navbar {
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    /* 🔥 LOGO */
    .logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-top: 20px;
      border: 3px solid #00aaff;
      box-shadow: 0 0 15px #00aaff;
    }

    /* HERO */
    .hero {
      padding: 40px 20px 100px;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #ddd;
      margin-bottom: 30px;
    }

    /* BUTTON */
    .btn {
      padding: 14px 30px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      background: #0088cc;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00aaff;
      transform: scale(1.05);
    }

    /* FEATURES */
    .features {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 40px 20px;
    }

    .feature {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 10px;
      width: 220px;
    }

    /* FOOTER */
    .footer {
      padding: 20px;
      font-size: 14px;
      color: #bbb;
    }

    @media(max-width: 768px) {
      .hero h1 {
        font-size: 30px;
      }
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    Akash Singh Verma
  </div>

  <!-- 🔥 LOGO IMAGE -->
  <img src="logo.jpg" class="logo">

  <!-- HERO -->
  <div class="hero">
    <h1>Join My Telegram Channel 🚀</h1>
    <p>Get latest updates, tips & exclusive content</p>

    <button class="btn" onclick="joinTelegram()">
      Join Now
    </button>
  </div>

  <!-- FEATURES -->
  <div class="features">
    <div class="feature">🔥 Daily Updates</div>
    <div class="feature">📈 Tips & Signals</div>
    <div class="feature">💰 Earn Opportunities</div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 Akash King Verma
  </div>

  <script>
    function joinTelegram() {
      window.location.href = "https://t.me/+XfiCSxMiE0s2MzBl";
    }
  </script>

</body>
</html>
